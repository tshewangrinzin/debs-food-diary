<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deb's Food Diary 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&family=Kosugi+Maru&family=VT323&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Kosugi Maru"', 'sans-serif'],
              display: ['"Comfortaa"', 'cursive'],
              mono: ['"VT323"', 'monospace'],
            },
            colors: {
              'pastel-pink': '#FFD1DC',
              'hot-pink': '#FF69B4',
              'lime-green': '#D1FFD7',
              'sky-blue': '#BFE6FF',
              'cream': '#FFFDD0',
            },
            backgroundImage: {
              'grid-pattern': "linear-gradient(to right, #ffe4e6 1px, transparent 1px), linear-gradient(to bottom, #ffe4e6 1px, transparent 1px)",
            },
            animation: {
              'spin-slow': 'spin 8s linear infinite',
              'float': 'float 3s ease-in-out infinite',
              'wiggle': 'wiggle 1s ease-in-out infinite',
              'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
              'glitch': 'glitch 3s cubic-bezier(.25,.46,.45,.94) infinite both',
              'glitch-scan': 'scan 2s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              wiggle: {
                '0%, 100%': { transform: 'rotate(-3deg)' },
                '50%': { transform: 'rotate(3deg)' },
              },
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
              },
              glitch: {
                '0%, 40%, 100%': { transform: 'translate(0)', filter: 'none', clipPath: 'none' },
                '1%': { transform: 'translate(-1px, -1px)', filter: 'hue-rotate(90deg)' },
                '2%': { transform: 'translate(1px, 1px)', filter: 'hue-rotate(180deg)' },
                '3%': { transform: 'translate(-1px, 1px)', filter: 'hue-rotate(270deg)' },
                '4%': { transform: 'translate(1px, -1px)', filter: 'hue-rotate(360deg)' },
                '5%': { transform: 'translate(-2px, 0)', filter: 'invert(1)' },
                '6%': { transform: 'translate(2px, 0)', filter: 'invert(0)' },
                '7%': { transform: 'translate(0, -1px)', clipPath: 'inset(10% 0 30% 0)' },
                '8%': { transform: 'translate(0, 1px)', clipPath: 'inset(40% 0 10% 0)' },
                '9%': { transform: 'translate(-1px, 1px)' },
              },
              scan: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(100%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #fdf2f8;
        background-size: 20px 20px;
        background-image: linear-gradient(to right, #fbcfe8 1px, transparent 1px), linear-gradient(to bottom, #fbcfe8 1px, transparent 1px);
      }
      /* Custom Scrollbar for that Webcore feel */
      ::-webkit-scrollbar {
        width: 12px;
      }
      ::-webkit-scrollbar-track {
        background: #ffe4e6;
      }
      ::-webkit-scrollbar-thumb {
        background: #f472b6;
        border: 2px solid #ffe4e6;
        border-radius: 6px;
      }
      .marquee-container {
        overflow: hidden;
        white-space: nowrap;
      }
      .marquee-content {
        display: inline-block;
        animation: marquee 15s linear infinite;
      }
      @keyframes marquee {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
      }
      /* Utility to hide scrollbar but keep functionality for sticky sidebars */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
